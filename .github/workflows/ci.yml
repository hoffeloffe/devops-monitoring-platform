name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pip install ruff
      - run: ruff check .
      - run: python -m py_compile src/main.py
      - run: python -m py_compile src/api/flask_app.py
      - run: python -m py_compile src/automation/alert_processor.py
      - run: python -m py_compile src/automation/cost_optimizer.py
      - run: python -m py_compile src/automation/deployment_monitor.py
      - run: python -m py_compile src/automation/infrastructure_monitor.py
